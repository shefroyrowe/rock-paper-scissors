<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Rock > Paper > Scissors</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="container">
            <h1 id="tagline">Play Rock, Paper, Scissors!<br> Best of 5!</h1>
            <div class="win-lose"></div>

            <div class="tooltip"></div>

        <span id="btn-wrap">
            <button id="rock">
                <img src="images/rock-clipart.png" alt="rock clipart">
            </button>
            <button id="paper">
                <img src="images/newspaper.png" alt="news paper clipart">
            </button>
            <button id="scissors">
                <img src="images/scissors-clipart.png" alt="scissors clipart">
            </button>
        </span>

            <div class="display"></div>
        </div>
        
        <script src="scripts.js" async defer></script>
    </body>
</html>
